name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on Ubuntu
    runs-on: ubuntu-latest
    strategy:
      # The matrix runs your tests 4 times in parallel (once for each version)
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        # --frozen ensures CI fails if someone forgot to update the lockfile
        run: uv sync --frozen --all-extras --dev

      - name: Run Tests
        # This assumes your tests are in a folder called /tests
        run: uv run pytest tests/
