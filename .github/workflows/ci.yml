name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Security best practice: Minimal permissions
permissions:
  contents: read

jobs:
  # Linting (Fast failure)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Mypy
        run: uv run mypy .

  # JOB 2: Testing (Runs at the same time as Lint)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Pytest
        run: uv run pytest
